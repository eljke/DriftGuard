name: Publish knowledge graph

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/knowledge-graph-pages.yml"
      - ".understand-anything/knowledge-graph.json"
      - ".understand-anything/config.json"
      - ".understand-anything/meta.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DriftGuard
        uses: actions/checkout@v4

      - name: Checkout Understand Anything
        uses: actions/checkout@v4
        with:
          repository: Egonex-AI/Understand-Anything
          ref: 09ede1917ffd043e6d5bbc8a80b45760814c2d7f
          path: .understand-dashboard

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .understand-dashboard/pnpm-lock.yaml

      - name: Install dashboard dependencies
        working-directory: .understand-dashboard
        run: pnpm install --no-frozen-lockfile

      - name: Enable GitHub source links
        run: node .github/scripts/patch-dashboard-code-viewer.mjs .understand-dashboard

      - name: Build dashboard
        working-directory: .understand-dashboard
        env:
          BASE_PATH: /DriftGuard/
          VITE_GRAPH_URL: /DriftGuard/knowledge-graph.json
          VITE_META_URL: /DriftGuard/meta.json
          VITE_CONFIG_URL: /DriftGuard/config.json
          VITE_SOURCE_BASE_URL: https://github.com/eljke/DriftGuard/blob/${{ github.sha }}
        run: |
          pnpm --filter @understand-anything/core build
          pnpm --filter @understand-anything/dashboard exec tsc -b
          pnpm --filter @understand-anything/dashboard exec vite build \
            --config vite.config.demo.ts \
            --base "$BASE_PATH"

          DIST_INDEX="$(find . -type f -path '*/packages/dashboard/dist/index.html' -print -quit)"
          if [ -z "$DIST_INDEX" ]; then
            echo "Dashboard dist/index.html was not found"
            exit 1
          fi

          DASHBOARD_DIST="$(realpath "$(dirname "$DIST_INDEX")")"
          sed -i "s|/demo/|$BASE_PATH|g" "$DASHBOARD_DIST/index.html"
          if grep -R '"/demo/' "$DASHBOARD_DIST/index.html" "$DASHBOARD_DIST/assets"; then
            echo "Static build still contains /demo/ URLs"
            exit 1
          fi
          echo "DASHBOARD_DIST=$DASHBOARD_DIST" >> "$GITHUB_ENV"

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -R "$DASHBOARD_DIST"/. _site/
          cp .understand-anything/knowledge-graph.json _site/
          cp .understand-anything/config.json _site/
          cp .understand-anything/meta.json _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
