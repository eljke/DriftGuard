name: Publish Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DriftGuard
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish artifacts
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/maven-settings.xml"
          import os
          from xml.sax.saxutils import escape

          username = escape(os.environ["CENTRAL_USERNAME"])
          password = escape(os.environ["CENTRAL_PASSWORD"])

          print(f"""<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>{username}</username>
                <password>{password}</password>
              </server>
            </servers>
          </settings>""")
          PY

          chmod +x mvnw
          ./mvnw -B --settings "$RUNNER_TEMP/maven-settings.xml" -Prelease deploy \
          -Dgpg.pinentry.mode=loopback
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
