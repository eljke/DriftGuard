server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

driftguard:
  enabled: true
  detectors:
    - name: latency-page-hinkley
      algorithm: page-hinkley
      metrics: [latency]
      warmup-samples: 20
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 50.0
      alpha: 0.05
    - name: latency-ks
      algorithm: ks
      metrics: [latency]
      baseline-window-size: 40
      current-window-size: 40
      warning-p-value: 0.05
      critical-p-value: 0.01
